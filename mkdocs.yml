site_name: Tech Hub
site_description: Personal technology learning hub by Rajkumar
site_author: Rajkumar
site_url: https://rajkumar611.github.io/TechHub

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/rajkumar611/TechHub
repo_name: rajkumar611/TechHub

nav:
  - Home: index.md

  - APIs & Web:
    - API Gateway: API_Gateway_Learning_Notes_Fresh.txt
    - REST RPC Custom Action: REST RPC CustomAction.txt
    - Comprehensive REST & API Guide: Comprehensive Study Guide REST, API.txt
    - Middleware: MiddleWare.txt
    - SignalR WCF gRPC: SignalR WCF gRPC.txt
    - nGinx Kestrel: nGinx Kestrel.txt
    - IIS Express vs IIS Server: IIS EXPRESS VS IIS SERVER.txt

  - Cloud & DevOps:
    - DevOps DevSecOps: DevOps DevSecOps.txt
    - Azure Functions & App Service: Azure functions and Azure App service.txt
    - Azure Service Principal vs Managed: Azure Service Principal vs Managed.txt
    - Terraform Bicep ARM: Terraform Bicep Arm.txt
    - Container Docker Kubernetes: Container Docker Kubernetes.txt
    - Akamai: Akamai.txt
    - Application Pool: Application Pool.txt

  - Architecture:
    - Design Patterns: Design Patterns.txt
    - Monolithic vs Microservices: Monolithic Microservices.txt
    - Modular Latency: Modular Latency.txt
    - DLL Hell GAC COM: DllHell GAC COM.txt

  - AI & Modern Tech:
    - Types of AI Agents: Types of AI Agents.txt
    - RAG or Trained Data Response: RAG or Trained data response.txt
    - MCP Servers: MCP Servers.txt
    - Create MCP Server - Good Links: Create MCP Server - Good links.txt
    - Claude Code vs GitHub Copilot: Claude Code Vs Github Copilot.txt
    - Microsoft Responsible AI: Microsoft's 6 Responsible AI principles.txt

  - .NET & C#:
    - Entity Framework: Entity Framework.txt
    - Async Await: Async Await.txt
    - Async Await Console vs ASP.NET: Async Await - Console Vs Asp.Net Vs Core.txt
    - Async vs Multithreading: Async Vs Multithreading.txt
    - Blazor: Blazor.txt
    - Hangfire: Hangfire.txt
    - Serialization vs Deserialization: Serialization Vs Deserialization.txt

  - Frontend:
    - Angular vs Vue vs Node vs TypeScript: Angular Vs Vue Vs Node Vs Typescript.txt

  - Data & Storage:
    - SQL Lite Prisma: SQL lite Prisma.txt

  - Tools & Platforms:
    - GIT: GIT.txt
    - GIT GitHub: GIT GITHUB.txt
    - Dynatrace: Dynatrace.txt
    - Error Log and Monitoring: Error Log and Monitoring.txt
    - Cyberark: Cyberark is an enterprise security.txt
    - Sharegate: Sharegate is a specialized tool for.txt
    - JetBrains Tools: Jet Brains Tools for Code quality.txt
    - Sublime vs Cursor: Sublime Vs Cursor.txt
    - Roselyn GC NAS: Roselyn GC NAS.txt
    - Hardware: Hardware.txt
    - YAML: Yaml.txt

  - General:
    - General Notes: General.txt
    - Insurance Learnings: Insurance Learnings.txt
    - What is an API: An API (Application Programming Int.txt
    - Yet to Explore: Yet to explore 1.txt

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
