site_name: Tech Hub
site_description: Personal technology learning hub by Rajkumar
site_author: Rajkumar
site_url: https://rajkumar611.github.io/TechHub

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
    primary: deep purple
    accent: purple
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/credit.js

